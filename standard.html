<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>표본오차 계산기</title>
    <style>
        /* 모바일 환경을 고려한 UI 설계 */
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f1f3f5; 
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container { 
            width: 100%;
            max-width: 360px; 
            background: #ffffff; 
            padding: 30px 24px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 1.4rem; margin: 0; color: #111; font-weight: 800; }
        header p { font-size: 0.85rem; color: #868e96; margin-top: 5px; }

        .input-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .input-card label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #495057;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* 숫자 키패드가 바로 뜨도록 유도 */
        input[type="number"] { 
            width: 100%; 
            height: 60px; 
            border: 2px solid #dee2e6; 
            border-radius: 15px; 
            font-size: 1.6rem; 
            font-weight: 800;
            text-align: center;
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s;
            background: #fff;
        }

        input[type="number"]:focus { 
            border-color: #339af0;
        }

        .result-box { 
            text-align: center;
            padding: 10px 0;
        }

        .result-title { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #adb5bd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-display {
            margin-top: 10px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .result-display.active { opacity: 1; }

        .error-value { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: #339af0; 
            letter-spacing: -1px;
        }

        .plus-minus { font-size: 1.8rem; margin-right: 4px; vertical-align: middle; }
        .unit { font-size: 1.4rem; margin-left: 4px; color: #339af0; font-weight: 700; }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: #ced4da;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>표본오차 계산기</h1>
        <p>95% 신뢰수준 정밀 계산</p>
    </header>
    
    <div class="input-card">
        <label for="nSize">표본 크기 (n)</label>
        <input type="number" id="nSize" placeholder="0" oninput="run()" pattern="\d*">
    </div>

    <div class="result-box">
        <span class="result-title">최대 허용 표본오차</span>
        <div id="resWrap" class="result-display">
            <span class="error-value"><span class="plus-minus">±</span><span id="resVal">0.00</span></span><span class="unit">%p</span>
        </div>
    </div>

    <footer>
        1.96 × √((0.5×0.5)/n) × 100<br>
        소수점 셋째 자리 반올림 적용
    </footer>
</div>

<script>
    function run() {
        const n = document.getElementById('nSize').value;
        const wrap = document.getElementById('resWrap');
        const val = document.getElementById('resVal');

        if (n && n > 0) {
            const error = 1.96 * Math.sqrt(0.25 / n) * 100;
            // 소수점 셋째 자리 반올림하여 둘째 자리까지
            val.innerText = (Math.round(error * 100) / 100).toFixed(2);
            wrap.classList.add('active');
        } else {
            wrap.classList.remove('active');
        }
    }
</script>

</body>
</html>
